<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <h1>القرآن الكريم</h1>
    <p class="subtitle">The Noble Quran</p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search surah by name or number...">
    </div>
  </header>

  <div class="app-container">
    <aside class="sidebar" id="surahList">
      <div class="loading">Loading surahs...</div>
    </aside>

    <main class="content" id="ayahView">
      <div class="empty-state">
        <h2>Select a Surah</h2>
        <p>Choose a surah from the list to read its ayahs.</p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
